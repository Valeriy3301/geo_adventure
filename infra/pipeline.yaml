pipeline:
  name: geo-data-transformer

  # CRS settings
  crs:
    source: "EPSG:4326"
    target: "EPSG:3857"

  # Geometry processing
  geometry:
    simplify_tolerance: 10
    preserve_topology: true

  # Feature enrichment toggles
  enrichment:
    enabled: true
    compute_area: true
    compute_perimeter: true
    compute_centroid: true
    compute_bbox: true

  # Validation
  validation:
    enabled: true

  # Caching (Redis)
  cache:
    enabled: true
    ttl_seconds: 3600
    key_prefix: "geo"

  # IO configuration
  io:
    input_dir: "data"
    output_dir: "outputs"

  # Export formats
  export:
    geojson: true
    csv: true

  # Logging
  logging:
    level: "INFO"

